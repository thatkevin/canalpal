<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b2a3a" />
    <title>Canal Pal</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="map"></div>

    <div id="loading">
      <img src="./img/ship.gif" alt="" width="90" />
      <p>Hoisting the sails…</p>
    </div>

    <header id="topbar">
      <img id="brand-parrot" src="./img/parrot.gif" alt="" width="34" />
      <strong>Canal Pal</strong>
      <span id="status" class="status"></span>
    </header>

    <div id="searchbar">
      <input id="search" type="search" placeholder="Search a place, junction or lock…" autocomplete="off" />
      <ul id="search-results" class="hidden"></ul>
    </div>

    <div id="hint" class="hint"></div>

    <nav id="toolbar">
      <button id="btn-undo" class="tool" title="Remove last point">↶</button>
      <button id="btn-reset" class="tool">CLS</button>
      <button id="btn-basemap" class="tool" title="Coloured / mono chart">MAP</button>
      <button id="btn-locate" class="tool" title="Find me">📍</button>
      <button id="btn-settings" class="tool" title="Speeds & times">⚙︎</button>
    </nav>

    <section id="panel" class="panel hidden collapsed">
      <button id="panel-header" type="button" aria-expanded="false">
        <span id="route-title">Journey</span>
        <span id="panel-chevron">▾</span>
      </button>
      <div id="panel-body">
        <div id="route-breadcrumb"></div>
        <div id="route-warning"></div>
        <div id="route-summary"></div>
        <div id="route-facilities"></div>
      </div>
    </section>

    <dialog id="settings">
      <form method="dialog">
        <h3>Speeds &amp; times</h3>
        <label>Cruising speed (mph)
          <input id="set-speed" type="number" min="1" max="8" step="0.5" />
        </label>
        <label>Minutes per lock
          <input id="set-lock" type="number" min="1" max="40" step="1" />
        </label>
        <label>Cruising hours per day
          <input id="set-hours" type="number" min="2" max="14" step="0.5" />
        </label>
        <p id="calib-note" class="muted"></p>
        <p class="credit">☠ Charts plundered fair an' square — with thanks — from the good crew at
          <a href="https://canalplan.org.uk" target="_blank" rel="noopener">CanalPlanAC</a>. Base waters © OpenStreetMap. ⚓</p>
        <menu>
          <button value="cancel">Close</button>
          <button id="set-save" value="save">Save</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>

name: Update CRT stoppages

# Daily refresh of Canal & River Trust stoppage notices into data/stoppages.json.
# GitHub fires this on the schedule — no server of ours involved. Free on public repos.
on:
  schedule:
    - cron: '30 6 * * *'   # 06:30 UTC daily
  workflow_dispatch: {}     # allow manual runs

permissions:
  contents: write

concurrency:
  group: stoppages
  cancel-in-progress: false

jobs:
  stoppages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-save playwright-core playwright
      - run: npx playwright install --with-deps chromium
      - run: node scripts/fetch-stoppages.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- public/data/stoppages.json docs/data/stoppages.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/stoppages.json docs/data/stoppages.json
            git commit -m "Update CRT stoppages ($(date -u +%F))"
            git push
          else
            echo "No stoppage changes."
          fi
